spring.application.name=rifaspro

# ═══ PostgreSQL (dev local) ═══
spring.datasource.url=jdbc:postgresql://localhost:5432/RIFITAS
spring.datasource.username=postgres
spring.datasource.password=Tanque.123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ═══ JPA / Hibernate ═══
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# ═══ Server ═══
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ═══ JWT ═══
jwt.secret=3f8a2b1c7e9d4f6a0b5c8e3d1a7f2b9c4e6d0f8a3c1b7e5d9f2a4c6e8b0d3f5
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# ═══ Cloudinary ═══
cloudinary.cloud-name=demo
cloudinary.api-key=replace-me
cloudinary.api-secret=replace-me
cloudinary.upload-folder=rifaspro/dev

# ═══ Mercado Pago ═══
mercadopago.access-token=TEST-replace-me
mercadopago.webhook-secret=replace-me
mercadopago.sandbox=true

# ═══ App ═══
app.base-url=http://localhost:8080
app.cors.allowed-origins=http://localhost:4200
app.upload-path=D:/DANILO/RIFAS/uploads

# ═══ Multipart (imágenes) ═══
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=10MB

# ═══ Jackson ═══
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ═══ Reservas ═══
reservation.expiry-minutes=30

# ═══ Scheduler ═══
scheduler.draw-check-ms=60000
scheduler.expiry-check-ms=30000
