spring.application.name=rifaspro

# ‚ïê‚ïê‚ïê PostgreSQL ‚ïê‚ïê‚ïê
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ‚ïê‚ïê‚ïê JPA / Hibernate ‚ïê‚ïê‚ïê
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${accion}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ‚ïê‚ïê‚ïê Server ‚ïê‚ïê‚ïê
server.port=${PORT:8080}
server.error.include-message=never
server.error.include-binding-errors=never

# ‚ïê‚ïê‚ïê JWT ‚ïê‚ïê‚ïê
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-expiration-ms=${JWT_REFRESH_MS:604800000}

# ‚ïê‚ïê‚ïê Cloudinary ‚ïê‚ïê‚ïê
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.upload-folder=rifaspro/prod

# ‚ïê‚ïê‚ïê Mercado Pago ‚ïê‚ïê‚ïê
mercadopago.access-token=${MP_ACCESS_TOKEN}
mercadopago.webhook-secret=${MP_WEBHOOK_SECRET}
mercadopago.sandbox=false

# ‚ïê‚ïê‚ïê App ‚ïê‚ïê‚ïê
app.base-url=${APP_BASE_URL}
app.cors.allowed-origins=${CORS_ORIGINS}

# ‚ïê‚ïê‚ïê Logs ‚ïê‚ïê‚ïê
logging.level.root=WARN
logging.level.com.rifas=INFO

# ‚ïê‚ïê‚ïê Reservas ‚ïê‚ïê‚ïê
reservation.expiry-minutes=${RESERVATION_EXPIRY_MINUTES:30}

# ‚ïê‚ïê‚ïê Scheduler ‚ïê‚ïê‚ïê
scheduler.draw-check-ms=60000
scheduler.expiry-check-ms=30000
